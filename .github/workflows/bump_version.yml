name: Bump Version

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: configure git
      run: |
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git config user.name 'github-actions[bot]'

    - name: create branch
      run: git checkout -b "bump-project-version-${{ github.run_number }}-${{ github.run_attempt }}"

    - name: check git status
      run: git status

    - name: Install uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install

    - name: Install dependencies
      run: uv sync --locked --all-extras --dev

    - name: Bump version
      run: |
        CURRENT_VERSION=$(grep -oP '^version = "\K[^"]+' pyproject.toml)
        echo "Current version: $CURRENT_VERSION"

        MAJOR_MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f1,2)
        NEW_VERSION="${MAJOR_MINOR}.${{ github.run_number }}${{ github.run_attempt }}"
        echo "New version: $NEW_VERSION"
        echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

        sed -i "s/^version = \"$CURRENT_VERSION\"/version = \"$NEW_VERSION\"/" pyproject.toml
        uv lock

    - name: stage changes
      run: |
        git add "${{ github.workspace }}/pyproject.toml"
        git add "${{ github.workspace }}/uv.lock"
        git status
        
    - name: commit changes
      run: git commit -m "Bump version to $NEW_VERSION"

    - name: push branch
      run: git push --set-upstream origin bump-project-version-${{ github.run_number }}-${{ github.run_attempt }}

    - name: create pull request
      run: gh pr create -B main -H "bump-project-version-${{ github.run_number }}-${{ github.run_attempt }}" --title 'Bump Project Version to ${{ github.run_number }}-${{ github.run_attempt }}' --body ' Project Version to ${{ github.run_number }}-${{ github.run_attempt }}' --label 'versionbump'
      env:
          GITHUB_TOKEN: ${{ secrets.PR_CREATION_TOKEN }}
