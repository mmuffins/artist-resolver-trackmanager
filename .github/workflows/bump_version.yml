name: Bump Version

on:
  workflow_dispatch:
  pull_request:
    types: 
      - opened
      - synchronize

permissions:
  contents: write
  pull-requests: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
      with:
        ref: ${{ github.head_ref }} # checkout the PR branch

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install

    - name: Install dependencies
      run: uv sync --locked --all-extras --dev

    - name: Bump version
      run: |
        CURRENT_VERSION=$(grep -oP '^version = "\K[^"]+' pyproject.toml)
        echo "Current version: $CURRENT_VERSION"

        MAJOR_MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f1,2)
        NEW_VERSION="${MAJOR_MINOR}.${{ github.run_number }}${{ github.run_attempt }}"
        echo "New version: $NEW_VERSION"
        echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

        sed -i "s/^version = \"$CURRENT_VERSION\"/version = \"$NEW_VERSION\"/" pyproject.toml
        uv lock

    - name: Commit and push new version
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add "${{ github.workspace }}/pyproject.toml"
        git add "${{ github.workspace }}/uv.lock"
        git commit -m "Bump version to $NEW_VERSION"
        git push origin ${{ github.head_ref }}

    - name: Comment on the PR with the new version
      run: |
        gh pr comment ${{ github.event.pull_request.number }} --body "Bumped version in pyproject.toml."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}